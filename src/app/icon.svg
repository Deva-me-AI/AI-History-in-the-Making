<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Hourglass / time symbol -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top triangle -->
    <polygon points="-80,-120 80,-120 0,-10" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Bottom triangle -->
    <polygon points="-80,120 80,120 0,10" fill="rgba(255,255,255,0.35)" stroke="white"/>
    <!-- Sand falling -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="rgba(255,255,255,0.6)" stroke-width="8"/>
    <!-- Sparkle dots for AI -->
    <circle cx="-40" cy="-60" r="6" fill="white" opacity="0.8"/>
    <circle cx="30" cy="-80" r="4" fill="white" opacity="0.6"/>
    <circle cx="-20" cy="70" r="5" fill="white" opacity="0.7"/>
    <circle cx="40" cy="50" r="4" fill="white" opacity="0.5"/>
  </g>
</svg>
